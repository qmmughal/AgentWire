# Optional local infrastructure for upcoming AgentWire services.
# MVP API uses SQLite — these containers are not required for Getting Started.
#
# From repo root:
#   docker compose -f deploy/docker-compose.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: agentwire
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: agentwire
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: agentwire_metrics
      CLICKHOUSE_USER: agentwire
      CLICKHOUSE_PASSWORD: password123

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  pgdata:
  chdata:
