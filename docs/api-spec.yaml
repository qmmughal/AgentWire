openapi: 3.0.3
info:
  title: AgentWire API
  version: 1.0.0
  description: API for ingesting and querying AI packets.
paths:
  /v1/traces:
    post:
      summary: Ingest a new AI packet or trace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIPacket'
      responses:
        '202':
          description: Packet accepted for processing.
  /v1/analytics/costs:
    get:
      summary: Retrieve cost analytics for a project.
      parameters:
        - name: projectId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cost analytics retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalCost:
                    type: number
                  breakdownByModel:
                    type: object
                    additionalProperties:
                      type: number
components:
  schemas:
    AIPacket:
      type: object
      properties:
        traceId:
          type: string
        agentId:
          type: string
        modelProvider:
          type: string
        modelName:
          type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        llmResponse:
          type: string
        promptTokens:
          type: integer
        completionTokens:
          type: integer
        latencyMs:
          type: number
      required:
        - traceId
        - modelName
